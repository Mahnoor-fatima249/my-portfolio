<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>Contact Me</title>
    <link rel="stylesheet" href="new.css">
</head>
<body>
    <header class="header">
        <h1>Contact </h1>
        <p>Hi there! I'm happy to connect with kind and creative people. If you have any questions or ideas, feel free to send me a message below.</p>
    </header>
    <section class="contact-section">
        <form action="/action_page.php" class="contact-form">
            <label for="yourName">Your Name:</label>
            <input type="text" id="yourName" name="yourName" placeholder="Enter your name">
            <label for="yourEmail">Your Email:</label>
            <input type="email" id="yourEmail" name="yourEmail" placeholder="Enter your email">
            <label for="yourMessage">Your Message:</label>
            <textarea id="yourMessage" name="yourMessage" rows="5" placeholder="Write your message here..."></textarea>
            <input type="submit" class="button" value="Send Message">
        </form>
        <p class="contact-info">
            You can also reach me directly at: <br>
            <a href="mailto:mahnoor.dev@gmail.com">mahnoor.dev@gmail.com</a>
        </p><br>
        <a href="new.html" class="button">Back to Home</a>
    </section>
</body>
</html>
