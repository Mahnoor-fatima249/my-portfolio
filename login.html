<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Mahnoor.dev</title>
    <link rel="stylesheet" href="new.css">
</head>
<body class="auth-page">

    <main class="container auth-container">
        <form class="login-form container-box">
            <h2 class="auth-title">SIGN IN</h2>
            <p class="auth-subtitle">Access your AI Dashboard</p>
            
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter Username" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter Password" required>
            </div>

            <div class="auth-links">
                <a href="#" class="link-cyan">Forgot Password?</a>
                <a href="signup.html" class="link-cyan">Create Account</a>
            </div>

            <div class="form-actions">
                <a href="dashboard.html" class="button full-width">Login</a>
            </div>
            
            <div class="back-home">
                <a href="index.html" class="link-back">← Back to Home</a>
            </div>
        </form>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Mahnoor.dev ┃ Secure Access</p>
        <button class="theme-toggle-btn" onclick="changeTheme()" title="Switch Theme">🎨</button>

    </footer>

</body>
</html>
