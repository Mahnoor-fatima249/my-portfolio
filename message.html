<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | Mahnoor.dev</title>
    <link rel="stylesheet" href="new.css">
</head>
<body class="messages-page"> 

    <header class="header">
        <div class="logo">Ⓜ Mahnoor.dev</div>
        <nav>
            <ul class="menu">
                <li><a href="dashboard.html" class="button">Dashboard</a></li>
                <li><a href="index.html" class="button">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="hero-section">
            <h1 class="welcome-text">Direct Messages</h1>
            <p>Have a technical inquiry about my <strong>AI Research</strong> or <strong>Web Projects</strong>? Drop a line below.</p>
        </section>

        <section class="contact-section container-box">
            <form action="#" class="contact-form">
                <div class="input-group">
                    <label for="yourName">Full Name</label>
                    <input type="text" id="yourName" name="yourName" placeholder="e.g. Recruiter Name" required>
                </div>

                <div class="input-group">
                    <label for="yourEmail">Email Address</label>
                    <input type="email" id="yourEmail" name="yourEmail" placeholder="name@company.com" required>
                </div>

                <div class="input-group">
                    <label for="yourMessage">Message</label>
                    <textarea id="yourMessage" name="yourMessage" rows="5" placeholder="Let's discuss an AI collaboration..." required></textarea>
                </div>
                
                <button type="submit" class="button full-width">Send Message</button>
            </form>
        </section>

        <div class="home-btn-container">
            <a href="dashboard.html" class="button secondary">Back to Dashboard</a>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Mahnoor.dev ┃ Built with Python & Clean Code</p>
        <button class="theme-toggle-btn" onclick="changeTheme()" title="Switch Theme">🎨</button>

    </footer>

    <script src="script.js"></script> 
</body>
</html>
