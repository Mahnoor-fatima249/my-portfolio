<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Mahnoor.dev</title>
    <link rel="stylesheet" href="new.css">
</head>
<body class="message-page"> <div class="container">
        <h2>Messages</h2>
        <section class="contact-section">
            <form action="#" class="contact-form">
                <label for="yourName">Your Name:</label>
                <input type="text" id="yourName" name="yourName" placeholder="Enter your name" required>

                <label for="yourEmail">Your Email:</label>
                <input type="email" id="yourEmail" name="yourEmail" placeholder="Enter your email" required>

                <label for="yourMessage">Your Message:</label>
                <textarea id="yourMessage" name="yourMessage" rows="5" placeholder="Write your message here..." required></textarea>
                
                <button type="submit" class="button">Send Message</button>
            </form>
            <br>
            <a href="dashboard.html" class="button">Back to Dashboard</a>
        </section>
    </div>
</body>
</html>
