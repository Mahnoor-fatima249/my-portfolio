<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | Mahnoor.dev</title>
    <link rel="stylesheet" href="new.css">
</head>
<body class="notifications-page">

    <header class="header">
        <div class="logo">Ⓜ Mahnoor.dev</div>
        <nav>
            <ul class="menu">
                <li><a href="dashboard.html" class="button">Dashboard</a></li>
                <li><a href="index.html" class="button">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="hero-section">
            <h1 class="welcome-text">Notification Settings</h1>
            <p>Control how you receive updates about your AI projects and academic progress.</p>
        </section>

        <section class="settings-card container-box">
            <form class="notification-form">
                <div class="checkbox-group">
                    <input type="checkbox" id="email" checked>
                    <label for="email"><strong>Email Notifications:</strong> Get HEC AI training updates.</label>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="sms" checked>
                    <label for="sms"><strong>SMS Alerts:</strong> Real-time internship task reminders.</label>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="system" checked>
                    <label for="system"><strong>System Alerts:</strong> LLM model deployment status.</label>
                </div>

                <button type="submit" class="button full-width">Save Preferences</button>
            </form>
        </section>

        <div class="home-btn-container">
            <a href="dashboard.html" class="button secondary">Back to Dashboard</a>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Mahnoor.dev ┃ Full Stack AI Intern</p>
        <button class="theme-toggle-btn" onclick="changeTheme()" title="Switch Theme">🎨</button>

    </footer>

    <script src="script.js"></script>
</body>
</html>
