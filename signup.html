<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Mahnoor.dev</title>
    <link rel="stylesheet" href="new.css">
</head>
<body class="home-page">

    <main class="container">
        <form class="login-form"> <h2 class="error-code" style="font-size: 2rem; animation: none;">SIGN UP</h2>
            <p style="margin-bottom: 20px;">Join the AI Innovation Hub</p>
            
            <div class="input-group">
                <label>First Name</label>
                <input type="text" placeholder="Enter First Name" required>
            </div>

            <div class="input-group">
                <label>Last Name</label>
                <input type="text" placeholder="Enter Last Name" required>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@example.com" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Create Password" required>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="Repeat Password" required>
            </div>

            <button type="submit" class="button" style="width: 100%; margin-top: 10px;">Create Account</button>
            
            <div style="margin-top: 20px; font-size: 0.9rem;">
                <p>Already have an account? <a href="login.html" style="color: #00ffff; text-decoration: none;">Login here</a></p>
                <a href="index.html" style="color: #f5f5f5; text-decoration: none; font-size: 0.8rem; display: block; margin-top: 10px;">← Back to Home</a>
            </div>
        </form>
    </main>

    <footer>
        <p>© 2026 Mahnoor.dev ┃ Join the Future of AI</p>
    </footer>

</body>
</html>
