<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings | Mahnoor.dev</title>
    <link rel="stylesheet" href="new.css">
</head>
<body class="settings-page">

    <header class="header">
        <div class="logo">Ⓜ Mahnoor.dev</div>
        <nav>
            <ul class="menu">
                <li><a href="dashboard.html" class="button">Dashboard</a></li>
                <li><a href="index.html" class="button">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="hero-section">
            <h1 class="welcome-text">Account Settings</h1>
            <p>Update your credentials and security preferences for your AI control panel.</p>
        </section>

        <section class="container-box settings-card">
            <form class="settings-form">
                <div class="input-group">
                    <label for="UserName">Display Name</label>
                    <input type="text" id="UserName" placeholder="Mahnoor Fatima">
                </div>

                <div class="input-group">
                    <label for="yourEmail">Registered Email</label>
                    <input type="email" id="yourEmail" placeholder="mf0488789@gmail.com">
                </div>

                <div class="input-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" placeholder="Enter new password">
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Confirm new password">
                </div>

                <div class="form-actions">
                    <button type="submit" class="button full-width">Save Changes</button>
                </div>
            </form>
        </section>

        <div class="home-btn-container">
            <a href="dashboard.html" class="button secondary">Back to Dashboard</a>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Mahnoor.dev ┃ High Performance AI Architecture</p>
        <button class="theme-toggle-btn" onclick="changeTheme()" title="Switch Theme">🎨</button>

    </footer>

    <script src="script.js"></script>
</body>
</html>
